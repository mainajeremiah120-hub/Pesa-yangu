<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#4A90E2"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Rounded square background with gradient -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#g)"/>

  <!-- Subtle inner glow overlay -->
  <rect width="64" height="64" rx="14" ry="14" fill="white" opacity="0.06"/>

  <!-- Outer diamond -->
  <polygon
    points="32,6 56,32 32,58 8,32"
    fill="none"
    stroke="white"
    stroke-width="4"
    stroke-linejoin="round"
    opacity="0.95"
  />

  <!-- Inner diamond (centred dot) -->
  <polygon
    points="32,18 44,32 32,46 20,32"
    fill="white"
    opacity="0.95"
  />
</svg>
